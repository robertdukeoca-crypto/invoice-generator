<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice Generator – WFH Contractor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f4f0; --surface: #ffffff; --border: #e0ddd6;
    --text: #1a1a18; --muted: #6b6b66; --accent: #1a1a18;
    --radius: 10px;
  }
  body { font-family: 'DM Sans', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }
  header { background: var(--accent); color: #fff; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 15px; font-weight: 500; letter-spacing: .03em; }
  header span { font-size: 12px; opacity: .55; }
  .container { display: grid; grid-template-columns: 400px 1fr; gap: 1.5rem; padding: 1.5rem 2rem; max-width: 1200px; margin: 0 auto; }
  @media (max-width: 820px) { .container { grid-template-columns: 1fr; padding: 1rem; } }
  .form-col { display: flex; flex-direction: column; gap: 1rem; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; }
  .card-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 1rem; }
  label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 3px; margin-top: 10px; }
  label:first-of-type { margin-top: 0; }
  input[type=text], input[type=date], input[type=email], input[type=number], textarea {
    width: 100%; font-family: inherit; font-size: 13px;
    background: #fafaf8; border: 1px solid var(--border);
    border-radius: 6px; padding: 7px 10px; color: var(--text);
    transition: border-color .15s;
  }
  input:focus, textarea:focus { outline: none; border-color: #888; background: #fff; }
  textarea { resize: vertical; min-height: 52px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .item-row { display: grid; grid-template-columns: 1fr 52px 90px 90px 30px; gap: 4px; align-items: center; margin-bottom: 4px; }
  .item-row input { padding: 5px 7px; font-size: 12px; }
  .item-header { display: grid; grid-template-columns: 1fr 52px 90px 90px 30px; gap: 4px; margin-bottom: 4px; }
  .item-header span { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); padding: 0 2px; }
  .credit-row { display: grid; grid-template-columns: 1fr 65px 65px 65px 30px; gap: 4px; align-items: center; margin-bottom: 4px; }
  .credit-row input { padding: 5px 7px; font-size: 12px; }
  .credit-header { display: grid; grid-template-columns: 1fr 65px 65px 65px 30px; gap: 4px; margin-bottom: 4px; }
  .credit-header span { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); padding: 0 2px; }
  .add-btn { font-size: 12px; color: var(--muted); background: none; border: 1px dashed var(--border); padding: 5px 12px; border-radius: 6px; cursor: pointer; margin-top: 6px; }
  .add-btn:hover { background: var(--bg); color: var(--text); }
  .del-btn { background: none; border: none; cursor: pointer; color: #ccc; font-size: 18px; line-height: 1; padding: 0; width: 26px; text-align: center; }
  .del-btn:hover { color: #e24b4a; }
  .totals { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 10px; }
  .t-row { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; color: var(--muted); }
  .t-row.grand { font-weight: 600; color: var(--text); font-size: 15px; padding-top: 8px; border-top: 1px solid var(--border); margin-top: 6px; }
  .actions { display: flex; gap: 8px; margin-top: .5rem; flex-wrap: wrap; }
  .btn-dark { background: var(--accent); color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-size: 13px; font-family: inherit; font-weight: 500; cursor: pointer; }
  .btn-dark:hover { opacity: .85; }
  .btn-outline { background: none; border: 1px solid var(--border); padding: 10px 20px; border-radius: 8px; font-size: 13px; font-family: inherit; cursor: pointer; color: var(--text); }
  .btn-outline:hover { background: var(--border); }
  .preview-col { position: sticky; top: 1.5rem; align-self: start; }
  .preview-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; }
  .inv { font-family: Arial, sans-serif; font-size: 12px; color: #111; }
  .inv-header { text-align: center; border-bottom: 2.5px solid #111; padding-bottom: 12px; margin-bottom: 16px; }
  .inv-header .title { font-size: 22px; font-weight: 700; letter-spacing: .08em; }
  .inv-header .subtitle { font-size: 13px; font-weight: 600; margin-top: 2px; }
  .inv-top { display: flex; justify-content: space-between; margin-bottom: 16px; line-height: 1.8; }
  .inv-top .right { text-align: right; }
  .inv-billto { margin-bottom: 16px; line-height: 1.8; }
  .inv-billto .bt-label { font-weight: 700; font-size: 13px; margin-bottom: 2px; }
  .sec-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: #555; margin: 14px 0 6px; }
  .inv-tbl { width: 100%; border-collapse: collapse; }
  .inv-tbl th { background: #111; color: #fff; font-size: 10px; font-weight: 600; text-transform: uppercase; padding: 6px 8px; text-align: left; }
  .inv-tbl th:not(:first-child), .inv-tbl td:not(:first-child) { text-align: right; }
  .inv-tbl td { padding: 6px 8px; border-bottom: 1px solid #eee; }
  .inv-tbl tr:nth-child(even) td { background: #f8f8f6; }
  .inv-tbl tfoot td { font-weight: 600; border-top: 2px solid #111; background: #f0f0ec; padding: 7px 8px; }
  .inv-note { font-size: 11px; color: #777; margin-top: 10px; }
</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <h1>🧾 Invoice Generator — WFH Contractor</h1>
  <span>Fill in the form → Print / Save PDF</span>
</header>

<div class="container">
  <div class="form-col">

    <div class="card">
      <div class="card-title">Invoice details</div>
      <div class="row2">
        <div><label>Invoice No.</label><input type="text" id="invNum" value="001"></div>
        <div><label>Date</label><input type="date" id="invDate"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Your info (From)</div>
      <label>Full name</label><input type="text" id="fromName" value="">
      <label>Address</label><input type="text" id="fromAddr" value="">
      <label>Phone</label><input type="text" id="fromPhone" value="">
      <label>Email</label><input type="email" id="fromEmail" value="">
    </div>

    <div class="card">
      <div class="card-title">Bill to (Client)</div>
      <label>Company name</label><input type="text" id="toCompany" value="Lease1.com.au Pty. Ltd.">
      <label>Reference / alias</label><input type="text" id="toRef" value="herein referred to as: Lease1">
      <label>ACN / Business ID</label><input type="text" id="toACN" value="ACN: 634 638 001">
      <label>Address</label><input type="text" id="toAddr" value="PO Box 61, Red Hill, QLD 4059">
      <label>Phone</label><input type="text" id="toPhone" value="Ph 1300 766 369">
      <label>Email</label><input type="email" id="toEmail" value="phillipchapman@mail.com">
      <label>Website</label><input type="text" id="toWeb" value="www.lease1.com.au">
    </div>

    <div class="card">
      <div class="card-title">Items / Services</div>
      <div class="item-header">
        <span>Description</span><span>Qty</span><span>Unit price</span><span>Total</span><span></span>
      </div>
      <div id="itemsContainer"></div>
      <div class="totals">
        <div class="t-row"><span>Total receivable</span><span id="subtotalDisp">0.00</span></div>
        <div class="t-row grand"><span>Balance Due</span><span id="totalDisp">0.00</span></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Credits / Leave tracker</div>
      <div class="credit-header">
        <span>Description</span><span>Issued</span><span>Used</span><span>Remaining</span><span></span>
      </div>
      <div id="creditsContainer"></div>
      <button class="add-btn" onclick="addCredit()">+ Add row</button>
      <label style="margin-top:12px">Planned leaves note</label>
      <input type="text" id="plannedLeaves" value="" placeholder="e.g. Planned Leaves">
    </div>

    <div class="actions">
      <button class="btn-dark" onclick="printInvoice()">🖨 Print / Save as PDF</button>
      <button class="btn-outline" onclick="resetForm()">Reset</button>
    </div>

  </div>

  <div class="preview-col">
    <div class="preview-wrap">
      <div class="inv" id="previewPanel"></div>
    </div>
  </div>
</div>

<script>
  // ── Date helpers ─────────────────────────────────────
  function getMonthDateRanges() {
    const raw = document.getElementById('invDate')?.value;
    if (!raw) return { first: '', second: '' };
    const date = new Date(raw + 'T00:00:00');
    const y = date.getFullYear();
    const m = date.getMonth();
    const monthName = date.toLocaleString('en-PH', { month: 'long' });
    const lastDay = new Date(y, m + 1, 0).getDate();
    return {
      first:  `${monthName} 1-15`,
      second: `${monthName} 16-${lastDay}`
    };
  }

  // ── Fixed data structure ──────────────────────────────
  // wage1, wage2 = the two half-month wage rows (price = full wage, total = price/2)
  // bonus = Annual Bonus row (price and total typed manually)
  let wage1  = { price: 0, total: 0 };
  let wage2  = { price: 0, total: 0 };
  let bonus  = { price: 0, total: 0 };
  let credits = [{ issued: 0, used: 0, remaining: 0 }];

  function fmt(n) {
    if (n === '' || n === null || isNaN(+n)) return '';
    return (+n).toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function esc(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function getVal(id) { return document.getElementById(id)?.value ?? ''; }

  // ── Build fixed service rows ──────────────────────────
  function buildItemRows() {
    const ranges = getMonthDateRanges();
    const c = document.getElementById('itemsContainer');
    c.innerHTML = '';

    // Row 1 — 1st–15th
    const r1 = document.createElement('div');
    r1.className = 'item-row';
    r1.innerHTML = `
      <input type="text"   id="desc1" value="${ranges.first}"  readonly style="background:#f0f0ec;color:#555">
      <input type="text"   id="qty1"  value="1" readonly style="background:#f0f0ec;color:#555;text-align:center">
      <input type="number" id="price1" value="${wage1.price}" placeholder="Full monthly wage">
      <input type="number" id="total1" value="${wage1.total}" placeholder="Auto (÷2)" readonly style="background:#f0f0ec;color:#555">
      <span></span>`;
    c.appendChild(r1);
    document.getElementById('price1').addEventListener('input', e => {
      wage1.price = +e.target.value;
      wage1.total = +(wage1.price / 2).toFixed(2);
      document.getElementById('total1').value = wage1.total;
      updatePreview();
    });

    // Row 2 — 16th–end
    const r2 = document.createElement('div');
    r2.className = 'item-row';
    r2.innerHTML = `
      <input type="text"   id="desc2" value="${ranges.second}" readonly style="background:#f0f0ec;color:#555">
      <input type="text"   id="qty2"  value="1" readonly style="background:#f0f0ec;color:#555;text-align:center">
      <input type="number" id="price2" value="${wage2.price}" placeholder="Full monthly wage">
      <input type="number" id="total2" value="${wage2.total}" placeholder="Auto (÷2)" readonly style="background:#f0f0ec;color:#555">
      <span></span>`;
    c.appendChild(r2);
    document.getElementById('price2').addEventListener('input', e => {
      wage2.price = +e.target.value;
      wage2.total = +(wage2.price / 2).toFixed(2);
      document.getElementById('total2').value = wage2.total;
      updatePreview();
    });

    // Row 3 — Annual Bonus (fixed label, manual price & total)
    const r3 = document.createElement('div');
    r3.className = 'item-row';
    r3.innerHTML = `
      <input type="text"   id="desc3" value="Annual Bonus (pro rata)" readonly style="background:#f0f0ec;color:#555">
      <input type="text"   id="qty3"  value="" readonly style="background:#f0f0ec;color:#555;text-align:center">
      <input type="number" id="price3" value="${bonus.price}" placeholder="Bonus unit price">
      <input type="number" id="total3" value="${bonus.total}" placeholder="Bonus total">
      <span></span>`;
    c.appendChild(r3);
    document.getElementById('price3').addEventListener('input', e => { bonus.price = +e.target.value; updatePreview(); });
    document.getElementById('total3').addEventListener('input', e => { bonus.total = +e.target.value; updatePreview(); });

    updateTotals();
  }

  // ── Build credit rows ─────────────────────────────────
  function buildCreditRows() {
    const c = document.getElementById('creditsContainer');
    c.innerHTML = '';
    credits.forEach((cr, i) => {
      const row = document.createElement('div');
      row.className = 'credit-row';
      // First row: fixed "Personal time off" label
      const descHtml = i === 0
        ? `<input type="text" id="cd-${i}" value="Personal time off" readonly style="background:#f0f0ec;color:#555">`
        : `<input type="text" id="cd-${i}" value="${esc(cr.desc)}" placeholder="Description">`;
      row.innerHTML = `
        ${descHtml}
        <input type="number" id="ci-${i}" value="${cr.issued}"    step="0.01">
        <input type="number" id="cu-${i}" value="${cr.used}"      step="0.01">
        <input type="number" id="cr-${i}" value="${cr.remaining}" step="0.01" readonly style="background:#f0f0ec;color:#888">
        ${i === 0 ? '<span></span>' : `<button class="del-btn" onclick="removeCredit(${i})">&times;</button>`}`;
      c.appendChild(row);

      if (i !== 0) document.getElementById(`cd-${i}`).addEventListener('input', e => { credits[i].desc = e.target.value; updatePreview(); });
      document.getElementById(`ci-${i}`).addEventListener('input', e => {
        credits[i].issued = +e.target.value;
        credits[i].remaining = +(credits[i].issued - credits[i].used).toFixed(2);
        const r = document.getElementById(`cr-${i}`); if (r) r.value = credits[i].remaining;
        updatePreview();
      });
      document.getElementById(`cu-${i}`).addEventListener('input', e => {
        credits[i].used = +e.target.value;
        credits[i].remaining = +(credits[i].issued - credits[i].used).toFixed(2);
        const r = document.getElementById(`cr-${i}`); if (r) r.value = credits[i].remaining;
        updatePreview();
      });
    });
  }

  function addCredit()     { credits.push({desc:'',issued:0,used:0,remaining:0}); buildCreditRows(); updatePreview(); }
  function removeCredit(i) { if(i===0) return; credits.splice(i,1); buildCreditRows(); updatePreview(); }

  // ── Totals ────────────────────────────────────────────
  function updateTotals() {
    const totalReceivable = +(wage1.price / 2).toFixed(2);
    const balanceDue      = bonus.price - bonus.total;
    document.getElementById('subtotalDisp').textContent = fmt(totalReceivable);
    document.getElementById('totalDisp').textContent    = fmt(balanceDue);
  }

  // ── Preview ───────────────────────────────────────────
  function updatePreview() {
    updateTotals();
    const ranges          = getMonthDateRanges();
    const totalReceivable = +(wage1.price / 2).toFixed(2);
    const balanceDue      = bonus.price - bonus.total;

    const itemRows = `
      <tr><td>${ranges.first}</td><td>1</td><td>${fmt(wage1.price)}</td><td>${fmt(wage1.total)}</td></tr>
      <tr><td>${ranges.second}</td><td>1</td><td>${fmt(wage2.price)}</td><td>${fmt(wage2.total)}</td></tr>
      <tr><td>Annual Bonus (pro rata)</td><td></td><td>${fmt(bonus.price)}</td><td>${fmt(bonus.total)}</td></tr>`;

    const creditRows = credits.map(cr => `
      <tr><td>Personal time off</td><td>${cr.issued}</td><td>${cr.used}</td><td>${cr.remaining}</td></tr>`).join('');

    document.getElementById('previewPanel').innerHTML = `
      <div class="inv-header"><div class="title">INVOICE</div><div class="subtitle">WFH CONTRACTOR</div></div>
      <div class="inv-top">
        <div class="left"><strong>${esc(getVal('fromName'))}</strong><br>${esc(getVal('fromAddr'))}<br>${esc(getVal('fromPhone'))}<br>${esc(getVal('fromEmail'))}</div>
        <div class="right"><div>${esc(getVal('invDate'))||'—'}</div><div><strong>INVOICE NO. ${esc(getVal('invNum'))}</strong></div></div>
      </div>
      <div class="inv-billto">
        <div class="bt-label">Bill To</div>
        <strong>${esc(getVal('toCompany'))}</strong><br>(${esc(getVal('toRef'))})<br>${esc(getVal('toACN'))}<br>${esc(getVal('toAddr'))}<br>${esc(getVal('toPhone'))}<br>E: ${esc(getVal('toEmail'))}<br>W: ${esc(getVal('toWeb'))}
      </div>
      <div class="sec-label">Services</div>
      <table class="inv-tbl">
        <thead><tr><th>Description</th><th>Qty</th><th>Unit Price</th><th>Total</th></tr></thead>
        <tbody>${itemRows}</tbody>
        <tfoot>
          <tr><td colspan="3" style="text-align:right">Total receivable</td><td>${fmt(totalReceivable)}</td></tr>
          <tr><td colspan="3" style="text-align:right;font-weight:700">Balance Due</td><td style="font-weight:700">${fmt(balanceDue)}</td></tr>
        </tfoot>
      </table>
      <div class="sec-label">Credits</div>
      <table class="inv-tbl">
        <thead><tr><th>Description</th><th>Issued</th><th>Used</th><th>Remaining</th></tr></thead>
        <tbody>${creditRows}</tbody>
      </table>
      <div class="inv-note">${esc(getVal('plannedLeaves'))}</div>`;
  }

  function printInvoice() {
    updatePreview();
    const content = document.getElementById('previewPanel').innerHTML;
    const w = window.open('','_blank');
    w.document.write(`<!DOCTYPE html><html><head><title>Invoice – WFH Contractor</title><style>body{font-family:Arial,sans-serif;padding:2.5rem;max-width:780px;margin:auto;font-size:12px;color:#111}.inv-header{text-align:center;border-bottom:2.5px solid #111;padding-bottom:12px;margin-bottom:16px}.title{font-size:22px;font-weight:700;letter-spacing:.08em}.subtitle{font-size:13px;font-weight:600;margin-top:2px}.inv-top{display:flex;justify-content:space-between;margin-bottom:16px;line-height:1.8}.right{text-align:right}.inv-billto{margin-bottom:16px;line-height:1.8}.bt-label{font-weight:700;font-size:13px;margin-bottom:2px}.sec-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#555;margin:14px 0 6px}.inv-tbl{width:100%;border-collapse:collapse}.inv-tbl th{background:#111;color:#fff;font-size:10px;font-weight:600;text-transform:uppercase;padding:6px 8px;text-align:left}.inv-tbl th:not(:first-child),.inv-tbl td:not(:first-child){text-align:right}.inv-tbl td{padding:6px 8px;border-bottom:1px solid #eee}.inv-tbl tr:nth-child(even) td{background:#f8f8f6}.inv-tbl tfoot td{font-weight:600;border-top:2px solid #111;background:#f0f0ec;padding:7px 8px}.inv-note{font-size:11px;color:#777;margin-top:10px}</style></head><body>${content}</body></html>`);
    w.document.close(); w.print();
  }

  function resetForm() {
    if (!confirm('Reset all fields?')) return;
    wage1  = { price: 0, total: 0 };
    wage2  = { price: 0, total: 0 };
    bonus  = { price: 0, total: 0 };
    credits = [{ issued: 0, used: 0, remaining: 0 }];
    document.getElementById('invNum').value        = '';
    document.getElementById('invDate').value       = '';
    document.getElementById('plannedLeaves').value = '';
    buildItemRows(); buildCreditRows(); updatePreview();
  }

  // Static fields — just update preview on input, no row rebuilding
  ['invNum','invDate','fromName','fromAddr','fromPhone','fromEmail',
   'toCompany','toRef','toACN','toAddr','toPhone','toEmail','toWeb','plannedLeaves']
  .forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    // Date field also rebuilds item rows to refresh month descriptions
    if (id === 'invDate') {
      el.addEventListener('input', () => { buildItemRows(); updatePreview(); });
    } else {
      el.addEventListener('input', updatePreview);
    }
  });

  // Init
  buildItemRows();
  buildCreditRows();
  updatePreview();
</script>
</body>
</html>
